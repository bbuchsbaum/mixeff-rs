# cargo-deny configuration — supply-chain gate for CI (see
# .github/workflows/ci.yml `supply-chain` job). Tuned for a numeric
# library crate with a deliberately small dependency surface
# (nalgebra, cobyla, statrs, minilp, optional nlopt/prima).

[advisories]
version = 2
# Fail on any RustSec advisory; revisit `ignore` only with a tracked issue.
ignore = []

[licenses]
version = 2
# Permissive licenses compatible with this crate's MIT license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are a warning, not a hard failure: transitive
# numeric/optimizer crates legitimately pin different minor versions.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
