name = "machines"
source = "nlme::Machines"
license = "Part of nlme; redistributable for academic use"
n_rows = 54
description = """
Milliken & Johnson (1992) productivity-score data: 6 workers × 3 machines,
3 replicates per cell. The standard small mixed-design fixture for crossed
fixed × random effects with a worker:machine interaction. Two common LMM
parametrisations: scalar interaction RE, or random Machine-slopes per worker.
Note: nlme stores Worker in non-canonical order (6,2,4,1,3,5).
"""

[[columns]]
name = "Worker"
type = "categorical"
levels = ["6","2","4","1","3","5"]

[[columns]]
name = "Machine"
type = "categorical"
levels = ["A","B","C"]

[[columns]]
name = "score"
type = "numeric"

[[fits]]
formula = "score ~ 1 + Machine + (1 | Worker) + (1 | Worker:Machine)"
family = "Gaussian"
link = "Identity"
estimator = "REML"

[[fits]]
# Alternative parametrisation: random Machine slopes per worker.
formula = "score ~ 1 + Machine + (1 + Machine | Worker)"
family = "Gaussian"
link = "Identity"
estimator = "REML"

[tags]
structure = ["random_intercept", "interaction_re", "random_slope_factor"]
difficulty = "moderate"
