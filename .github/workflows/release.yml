name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Gate 1: formatting, linting, docs ──────────────────────────────────────
  lint:
    name: lint (fmt + clippy + doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install NLopt build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy unstable-internals (deny warnings)
        run: cargo clippy --all-targets --features unstable-internals -- -D warnings
      - name: rustdoc (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

  # ── Gate 2: tests (debug) ──────────────────────────────────────────────────
  test:
    name: test (debug, default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install NLopt build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: cargo test
        run: cargo test

  # ── Gate 3: tests (release) ────────────────────────────────────────────────
  # Optimizer/Cholesky behavior can differ between debug and release builds
  # (FMA contraction, inlining). Must be a blocking gate for releases.
  test-release:
    name: test (release mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install NLopt build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: cargo test --release
        run: cargo test --release

  # ── Gate 4: MSRV ──────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - name: cargo test at pinned MSRV (no-default-features)
        run: cargo +1.85 test --no-default-features

  # ── Gate 5: Julia parity (REQUIRED on tag) ─────────────────────────────────
  # Mirrors the scheduled julia-parity job in ci.yml exactly (same actions,
  # same Julia version pin, same dependency install, same script invocation).
  # This is a hard blocking gate for publish: if fixtures have drifted the
  # release must not proceed.
  julia-parity:
    name: Julia parity fixtures (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - name: Install Julia parity dependencies
        run: julia -e 'using Pkg; Pkg.add(["MixedModels", "DataFrames", "JSON3"])'
      - name: Check Julia parity fixtures
        run: bash scripts/check_julia_parity_fixtures.sh

  # ── Publish (only after ALL gates pass) ───────────────────────────────────
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - test-release
      - msrv
      - julia-parity
    # Belt-and-suspenders: only run on the v* tag that triggered this workflow.
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install NLopt build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      # Emit the package file list to the log for audit before publishing.
      - name: Audit packaged files (cargo package --list)
        run: cargo package --list | sort
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
