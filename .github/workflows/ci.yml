name: CI

on:
  push:
  pull_request:
  schedule:
    # Weekly external-parity refresh: checked-in fixtures and comparison
    # artifacts rot silently as MixedModels.jl / lme4 evolve, so re-check
    # them on a schedule.
    - cron: "0 6 * * 1"
  # Manual trigger for the external-parity jobs (e.g. after an upstream
  # MixedModels.jl or lme4 release) without waiting for the weekly cron.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            os: ubuntu-latest
            command: cargo test
          - name: default
            os: macos-latest
            command: cargo test
          - name: default
            os: windows-latest
            command: cargo test
          - name: nlopt
            os: ubuntu-latest
            command: cargo test --features nlopt
          - name: no-default-features
            os: ubuntu-latest
            command: cargo test --no-default-features
          - name: prima
            os: ubuntu-latest
            command: cargo test --no-default-features --features prima
          # Runs on every push/PR (no schedule guard) so the gated
          # compiler/datasets/pathology contract tests stay continuously
          # covered even though that surface is not part of the stable 1.0 API.
          - name: unstable-internals
            os: ubuntu-latest
            command: cargo test --features unstable-internals
          - name: nlopt+unstable
            os: ubuntu-latest
            command: cargo test --features "nlopt unstable-internals"
          # Release-mode test leg: optimizer/Cholesky behavior can differ
          # between debug and release builds (FMA contraction, inlining), so
          # this is a required blocking job, not optional.
          - name: release
            os: ubuntu-latest
            command: cargo test --release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install NLopt build prerequisites
        if: matrix.name != 'no-default-features' && matrix.name != 'prima' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: Install PRIMA C library
        if: matrix.name == 'prima' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ gfortran
          git clone --depth 1 --branch v0.7.2 https://github.com/libprima/prima.git "$RUNNER_TEMP/prima"
          cmake -S "$RUNNER_TEMP/prima" -B "$RUNNER_TEMP/prima-build" -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/prima-install"
          cmake --build "$RUNNER_TEMP/prima-build" --target install --parallel
          echo "PRIMA_DIR=$RUNNER_TEMP/prima-install" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$RUNNER_TEMP/prima-install/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
      - name: Run tests
        run: ${{ matrix.command }}

  lint:
    name: lint (fmt + clippy + doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install NLopt build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: clippy unstable-internals (deny warnings)
        run: cargo clippy --all-targets --features unstable-internals -- -D warnings
      - name: rustdoc (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      # NLopt requires CMake/C++ toolchain; skip it for the MSRV leg by using
      # --no-default-features so we avoid C/CMake MSRV coupling while still
      # actually running tests (not just checking) at the declared MSRV.
      - name: cargo test at pinned MSRV (no-default-features)
        run: cargo +1.85 test --no-default-features

  supply-chain:
    name: cargo deny + cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - name: cargo deny
        run: cargo deny check
      - name: cargo audit
        run: cargo audit

  julia-parity:
    name: Julia parity fixtures (scheduled)
    # Only on the weekly schedule or a manual dispatch: the parity gate needs
    # a Julia toolchain plus MixedModels.jl and is too slow for every push/PR.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1"
      - name: Install Julia parity dependencies
        run: julia -e 'using Pkg; Pkg.add(["MixedModels", "DataFrames", "JSON3"])'
      - name: Check Julia parity fixtures
        run: bash scripts/check_julia_parity_fixtures.sh
      - name: Record engine provenance
        if: always()
        run: julia -e 'using Pkg; Pkg.status(["MixedModels", "DataFrames", "JSON3"])'

  lme4-parity:
    name: lme4 comparison refresh (scheduled)
    # Only on the weekly schedule or a manual dispatch: regenerates the
    # comparison artifacts against a live R/lme4 and re-runs the parity
    # scorecard gate, which catches unreviewed classification drift.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install NLopt build prerequisites
        run: sudo apt-get update && sudo apt-get install -y cmake g++
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R comparison dependencies
        run: Rscript -e 'install.packages(c("lme4", "jsonlite"))'
      # The same sequence as scripts/check_release_lme4_parity.sh, but
      # without its restore-on-exit behavior so the regenerated artifacts
      # stay in the tree for the drift diff and upload below.
      - name: Regenerate Rust comparison results
        run: cargo run --release --features unstable-internals --example compare_rust
      - name: Regenerate lme4 comparison results
        run: Rscript scripts/compare_lme4.R
      - name: Regenerate comparison report
        run: cargo run --release --features unstable-internals --example compare_report
      - name: Parity scorecard gate (catches unreviewed classification drift)
        run: cargo test --features unstable-internals --test parity_scorecard
      - name: Show comparison drift against checked-in artifacts
        if: always()
        run: git --no-pager diff --stat comparison/ || true
      - name: Upload regenerated comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lme4-comparison-refresh
          path: |
            comparison/manifest.json
            comparison/rust_results.json
            comparison/lme4_results.json
            comparison/REPORT.md
          if-no-files-found: warn
