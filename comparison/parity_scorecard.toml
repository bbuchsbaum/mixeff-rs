# Machine-readable release parity classification for every datasets/* [[fits]]
# row. Keep this in sync with comparison/manifest.json and comparison/REPORT.md.

schema_version = "1.0.0"

classes = [
  "release_blocking_parity",
  "documented_divergence",
  "unsupported_with_contract",
  "stress_opt_in",
  "performance_known_slow",
]

[[row]]
dataset = "arabidopsis"
formula = "total.fruits ~ amd * nutrient + (1 | reg/popu) + (1 | gen)"
family = "Poisson"
link = "Log"
estimator = "Laplace"
class = "release_blocking_parity"
reference = "lme4_numeric_without_objective_constants"
reason = "beta/theta/sigma parity is release-blocking; objective constants are explicitly non-comparable for GLMMs"

[[row]]
dataset = "cake"
formula = "angle ~ 1 + recipe * temperature + (1 | recipe:replicate)"
family = "Gaussian"
link = "Identity"
estimator = "REML"
class = "release_blocking_parity"
reference = "lme4"

[[row]]
dataset = "cbpp"
formula = "incidence / size ~ 1 + period + (1 | herd)"
family = "Binomial"
link = "Logit"
estimator = "Laplace"
class = "documented_divergence"
reference = "fast_pirls_profiled_glmm"
reason = "current fast-PIRLS profiled path has a beta gap from lme4 joint estimation; keep as non-lme4 contract until certified joint GLMM optimizer"
issue_id = "bd-01KRV8F0C4X8W7S5XGQYFP8P48"

