# Difficult-model corpus and time-to-certified-fit scoreboard.
#
# This file is a release-facing manifest for hard cases. It deliberately sits
# beside parity_scorecard.toml: parity_scorecard.toml classifies every dataset
# fit, while this file selects the difficult rows and records why they matter.

schema_version = "1.0.0"

required_axes = [
  "zero_variance_lmm",
  "near_boundary_lmm",
  "rank_deficient_random_slope_lmm",
  "overspecified_random_slopes_lmm",
  "constant_response_pathology_lmm",
  "crossed_sparse_lmm",
  "invalid_boundary_start_lmm",
  "glmm_near_zero_random_effect",
  "glmm_near_zero_gamma_random_effect",
  "glmm_rare_event_separation",
  "glmm_rare_event_bernoulli",
  "glmm_fast_pirls_divergence",
  "glmm_large_profiled_gap",
]

certification_statuses = [
  "release_blocking_parity",
  "certified_joint_laplace",
  "certified_joint_agq",
  "certified_fit",
  "certified_boundary",
  "diagnostic_contract",
  "documented_divergence",
  "experimental_recovery",
  "performance_known_slow",
  "unit_test_recovery",
  "stress_opt_in",
]

[[scenario]]
id = "dyestuff2_reml_zero_variance"
axis = "zero_variance_lmm"
description = "Canonical scalar LMM with random-effect variance estimated at zero."
data_source = "datasets/dyestuff2"
generator = "checked-in fixture"
dataset = "dyestuff2"
formula = "Yield ~ 1 + (1 | Batch)"
family = "Gaussian"
link = "Identity"
estimator = "REML"
comparator_engines = ["lme4"]
release_relevance = "Boundary variance should be reported as a valid fitted boundary, not an optimizer failure."
scorecard_class = "release_blocking_parity"
certification_status = "certified_boundary"
certification_claim = "Rust and lme4 both fit a singular boundary model with theta pinned at zero."
required_metrics = ["objective_delta", "beta_delta", "theta_delta", "optimizer_status", "singular_status", "warnings", "wall_time_ms", "fevals", "time_to_certified_fit_ms"]
rust_certification = "single_fit_certificate"
comparator_certification = "single_fit_warning"
rust_time_multiplier = 1.0
comparator_time_multiplier = 1.0
comparator_extra_ms = 0.0

