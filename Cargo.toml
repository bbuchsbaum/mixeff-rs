[package]
name = "mixedmodels"
version = "0.1.0"
edition = "2021"
description = "Mixed-effects models in Rust — port of MixedModels.jl"
license = "MIT"

[dependencies]
nalgebra = { version = "0.33", features = ["serde-serialize"] }
nalgebra-sparse = "0.10"
cobyla = "1"
statrs = "0.18"
rand = "0.8"
rand_distr = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
num-traits = "0.2"
approx = "0.5"
indexmap = "2"
log = "0.4"

[dev-dependencies]
approx = "0.5"
